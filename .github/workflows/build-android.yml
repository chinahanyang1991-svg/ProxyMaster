name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Expo project
        run: npx expo prebuild --platform android --clean
        env:
          CI: true

      - name: Fix build.gradle compatibility issue
        run: |
          # Remove enableBundleCompression which is not supported in older RN
          sed -i '/enableBundleCompression/d' android/app/build.gradle

      - name: Generate signing key
        run: |
          cd android/app
          keytool -genkeypair -v -storetype pkcs12 -keystore release.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=ProxyMaster, O=ProxyMaster, C=CN"

      - name: Create signing properties
        run: |
          cd android/app
          printf 'key.store=release.keystore\nkey.alias=android\nkey.store.password=android123\nkey.alias.password=android123' > release-signing.properties

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -x lint -x test --no-daemon
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxyMaster-APK
          path: android/app/build/outputs/apk/release/app-release.apk
